<!DOCTYPE html>
<html>
<head>
<link href = './tryingxml.css' rel = "stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


</head>
<body>

<h1>The XMLHttpRequest Object</h1>

<!--
<button type="button" onclick="loadDoc()">Get my CD collection</button>
-->


<br><br>
<div id="gridgarden"></div>

<script>
function loadDoc() {
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      myFunction(this);
    }
  };
  xhttp.open("GET", "./tester.xml", true);
  xhttp.send();
}
function myFunction(xml) {
  var i;
  var xmlDoc = xml.responseXML;
  var pp="";
  var x = xmlDoc.getElementsByTagName("image");
  for (i = 0; i <x.length; i++) { 
    pp += "<div><img src ='" +
    x[i].getElementsByTagName("pic")[0].childNodes[0].nodeValue +
    "'></div>";
  }
  document.getElementById("gridgarden").innerHTML = pp;
}

loadDoc();
</script>

</body>
</html>
